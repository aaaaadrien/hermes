[llm]
# URL de base du serveur llama.cpp (compatible OpenAI)
base_url = http://localhost:8080/v1

# Clé API (inutile sur un inférence locale)
api_key = sk-no-key-required

# Nom du modèle (facultatif si llamacpp ou vLLM, masis nécessaire pour ollama)
model = gemma4

# Nombre maximum de tokens
max_tokens = 65536

# Température
temperature = 0.7

[whisper]
# URL de base du serveur whisper.cpp
base_url = http://localhost:8081

# Route native de l'API whisper.cpp (PAS l'API de compatibilité OpenAI)
endpoint = /inference

# Format de réponse renvoyé par le serveur : json (recommandé), text, srt, vtt...
response_format = json

# Langue forcée pour la transcription (code ISO-639-1, laisser vide pour auto-détection)
language = fr

[agent]
# Prompt système 
system_prompt = Tu es un agent expert. Utilise tes outils pour donner des réponses précises et bien structurées.

[tools]
# Active ou désactive chaque outil individuellement (true / false)
enable_meteo              = true
enable_wiki               = false
enable_argent             = true
enable_duckduckgo         = true
enable_recup_page         = true
enable_datetime           = true
enable_generer_fichier    = true
enable_youtube_transcript = true
enable_transcrire_audio   = true

[web]
# Titre affiché dans l'onglet du navigateur
page_title = Hermes chatbot by Linuxtricks.fr
# Emoji dans la barre de titre
page_icon  = 📜
# Titre H1 de l'interface Streamlit
header     = Hermes chatbot by Linuxtricks.fr

[cli]
# Bannière d'accueil au démarrage
banner       = === HERMES PRÊT — Tapez 'exit' pour quitter ===
# Préfixes d'affichage dans la console
user_prefix  = Vous
agent_prefix = Hermes
